author: "tgstation"
delete-after: True
changes:
  - bugfix: "Любой эффект, изменяющий тему окружающей среды, больше не ломает объекты, закреплённые на тайлах"
  - bugfix: "Гарнитуры псайкеров теперь предотвращают отключение эхолокации из-за глухоты."
  - bugfix: "Охотники псайкеров теперь появляются с атмосферными очками. Псайкер-провидец теперь появляется с тепловым монокуляром (который ранее находился на корабле)."
  - qol: "Кровяные черви теперь могут самостоятельно заползать на трупы, чтобы заражать их, как альтернатива нажатию кнопки действия."
  - admin: "Кровь теперь лечит псайкеров."
  - admin: "Mind magnified обезьяны теперь подпадают под бан на разумность (раньше их нельзя было забанить)"
  - qol: "Теперь рост является элементом ДНК, что позволяет изменять его посредством генетики или радиационных бурь; также он переносится между генетическими копиями (например, генокрадами)."
  - balance: "Улучшенные экзосканеры больше не имеют резко возрастающего энергопотребления при апгрейде после инцидента, когда главный инженер станции объявил вендетту отделу карго за чрезмерное потребление энергии, что привело к массовым жертвам."
  - balance: "На корабле охотников на псайкеров теперь есть перевязь и две кобуры для дробовика и револьверов, а также запасные ножи."
  - balance: "На охотничьем корабле псайкеров теперь есть перевязь и две кобуры для их дробовиков и револьверов, а также запасные ножи."
  - balance: "Все охотники псайкеров теперь появляются с гарнитурой, настроенной на общую частоту."
  - balance: "На охотничьем корабле псайкеров теперь есть коробка с бинтами и аварийная аптечка."
  - balance: "Охотники псайкеров теперь появляются с атмосферным/стилизованным eyewear. Псайкер-провидец теперь появляется с тепловым монокуляром (который ранее находился на корабле)."
  - balance: "Все охотники псайкеров теперь появляются с гарнитурой, настроенной на общую частоту."
  - bugfix: "Любой эффект, меняющий тему окружающей среды, больше не ломает объекты, закрепленные на полу."
  - bugfix: "Исправляет проблему, из-за которой пресс-бейджи и прочие объекты не позволяли игроку осматривать их."
  - bugfix: "Огненное дыхание теперь более стабильно поджигает объекты"
  - bugfix: "Разрушение покрытия лавой/водой и т.п. теперь уничтожает любые объекты, закрепленные на нем."
  - admin: "Некоторые некритичные действия VV, такие как изменение мутаций/органов/особенностей, были переведены на TGUI"
  - admin: "Кристаллическое возрождение эфирного существа больше не ломается при смене вида в процессе."
  - bugfix: "Кровяные черви теперь могут самостоятельно перемещаться на трупы, чтобы заражать их, а не только через кнопку действия."
  - bugfix: "Глушители рации больше не выводят гарнитуры из строя навсегда"
  - bugfix: "Обновленные экзосканеры больше не потребляют чрезмерное количество энергии при улучшении, после инцидента с вендеттой главного инженера к карго."
  - bugfix: "Обезьяны с увеличенным разумом теперь корректно подпадают под бан на разумность (раньше это не работало)."
  - bugfix: "Исправлены генераторы поля без питания, которые отбрасывали людей"
  - bugfix: "Админы теперь могут банить роли \"восстановленный экипаж\", \"кровяной червь\", \"беглец\"/\"охотник на беглецов\", \"глич\" и \"парадоксальный клон\"."
  - bugfix: "Исправлен верб админ-спавна: краш при раннем вводе и прокрутка стрелками"
  - bugfix: "Огненное дыхание теперь более стабильно поджигает объекты."
  - qol: "Исправлено лишнее число 0 в интерфейсе еретиков."
  - refactor: "Полностью переработан код управления HUD, сообщайте о любых проблемах!"
  - balance: "Улучшенные гидропонные поддоны теперь потребляют меньше энергии при апгрейде, после жалоб инженеров и ботаников на частые короткие замыкания и перерасход энергии."
  - bugfix: "Киборги теперь корректно теряют сознание при использовании emag."
  - bugfix: "Блокировщики FOV больше не удаляются аварийно"
  - rscdel: "Дрифт в невесомости больше не зависит от инерции — поведение возвращено к прежнему состоянию."
  - bugfix: "Исправлены значки прессы и другие объекты, которые не позволяли их осматривать."
  - bugfix: "Органы, выращенные через цитологию, снова могут мутировать."
  - bugfix: "Иконка сна снова отображается, а иконка отдыха теперь учитывает режим \"Toggle Hotkeys button\"."
  - bugfix: "HUD теперь отображается при просмотре вверх, а также через ИИ и камеры на нижних уровнях."
  - rscadd: "Верб админ-спавна теперь корректно обрабатывает ранний ввод и поддерживает перемещение стрелками."
  - map: "Все слот-машины заменены на случайные спавнеры слот-машин. Добавлены синдикатские слот-машины на базы Синдиката и ядерные аванпосты."
  - admin: "Некоторые некритичные действия VV (мутации/органы/особенности) переведены на TGUI."
  - rscadd: "Глушители рации больше не ломают гарнитуры навсегда."
  - rscadd: "Снежные и песчаные бури теперь очищают следы, оставленные на снегу или песке."
  - rscadd: "Исправлены миражи при переходе между z-уровнями, которые не отображали все объекты."
  - rscadd: "Теперь можно засыпать следы на снегу снегом."
  - qol: "Выпадающий список VV обновлён и теперь имеет строку поиска."
  - bugfix: "Теперь можно ставить пневматическую пушку (и пушку с пирогами клоуна!) на столы."
  - bugfix: "Три способности культа больше не вызывают runtime-ошибки"
  - bugfix: "Исправлены генераторы поля без энергии, отбрасывающие персонажей."
  - qol: "Тела \"восстановленного экипажа\"/Thanatorenasia в морге теперь меняют индикатор на зелёный, если их орбитит призрак (сигнал о желании быть воскрешённым)"
  - qol: "Панели админ-спавна теперь имеют постоянные пути, смещения и диагональные направления."
  - bugfix: "Использование улучшения дефибриллятора киборга на медиборге с установленным рюкзачным дефибом теперь корректно его извлекает"
  - qol: "Исправлено энергопотребление энергетических пушек мехов, которое было в 100 раз меньше задуманного."
  - qol: "Рецепты крафта еды теперь имеют три подкатегории — тип кухни, тип блюда и тип приёма пищи. Теперь можно фильтровать, например, \"пиццы мотыльков\" или \"супы ящеров\", не гадая, где искать рецепт."
  - spellcheck: "Улучшенные гидропонные поддоны теперь потребляют меньше энергии при улучшении деталей, в ответ на жалобы инженерного и ботанического персонала."
  - rscadd: "Удалённые химические импланты теперь можно синхронизировать с устройством удалённого сигнала для активации без консоли управления заключёнными."
  - qol: "Не пришельцы с имплантированным плазменным сосудом теперь видят уровень плазмы в HUD, а не только в панели статов."
  - qol: "При случайной генерации (например, через токсин mulligan) также случайно выбирается голос TTS"
  - bugfix: "Полностью переработан код HUD — сообщайте о любых багах."
  - refactor: "Код камер был переработан. Сообщайте о багах на GitHub"